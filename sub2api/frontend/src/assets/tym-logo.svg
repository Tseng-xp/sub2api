<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 72" width="290" height="72">
  <defs>
    <linearGradient id="gIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="gSubR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
  <rect width="290" height="72" rx="10" fill="transparent"/>
  <!-- Geometric icon: hexagon with inner triangle -->
  <g transform="translate(28,32)">
    <polygon points="22,0 44,13 44,39 22,52 0,39 0,13" fill="url(#gIcon)" rx="0"/>
    <polygon points="22,14 30,30 14,30" fill="#ffffff" opacity="0.9"/>
  </g>
  <!-- T - Blue -->
  <text x="60" y="46" font-family="Arial,Helvetica,sans-serif" font-size="36" font-weight="900" fill="#3b82f6">T</text>
  <!-- Y - Purple -->
  <text x="84" y="46" font-family="Arial,Helvetica,sans-serif" font-size="36" font-weight="900" fill="#8b5cf6">Y</text>
  <!-- M - Pink -->
  <text x="110" y="46" font-family="Arial,Helvetica,sans-serif" font-size="36" font-weight="900" fill="#ec4899">M</text>
  <!-- Subtitle -->
  <text x="64" y="62" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="11" font-weight="400" letter-spacing="4" fill="url(#gSubR)">通 元 聚 合</text>
</svg>