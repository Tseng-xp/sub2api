<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="32" height="32">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="8" y="8" width="176" height="176" rx="36" ry="36"
        fill="url(#g1)" />

  <!-- Tech circuit accents -->
  <circle cx="36" cy="36" r="4" fill="#22d3ee" opacity="0.6"/>
  <circle cx="156" cy="36" r="4" fill="#22d3ee" opacity="0.6"/>
  <circle cx="36" cy="156" r="4" fill="#22d3ee" opacity="0.6"/>
  <circle cx="156" cy="156" r="4" fill="#22d3ee" opacity="0.6"/>

  <!-- Horizontal lines (circuit trace) -->
  <line x1="44" y1="36" x2="148" y2="36" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
  <line x1="44" y1="156" x2="148" y2="156" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>

  <!-- T letter -->
  <g transform="translate(30, 52)">
    <rect x="0" y="0" width="38" height="9" rx="4.5" fill="white"/>
    <rect x="14.5" y="0" width="9" height="70" rx="4.5" fill="white"/>
  </g>

  <!-- Y letter -->
  <g transform="translate(76, 52)">
    <polygon points="18,0 35,35 27,35 18,20 9,35 1,35" fill="white"/>
    <rect x="13.5" y="35" width="9" height="35" rx="4.5" fill="white"/>
  </g>

  <!-- M letter -->
  <g transform="translate(120, 52)">
    <polygon points="0,70 9,70 18,30 27,70 36,70 36,0 27,0 27,42 18,6 9,42 9,0 0,0" fill="white"/>
  </g>
</svg>